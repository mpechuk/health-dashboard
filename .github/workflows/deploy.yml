name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Publish the site by committing to the gh-pages branch.
permissions:
  contents: write

# Only one concurrent production deploy; let in-progress runs finish.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          # Static site lives at the repo root.
          folder: .
          # Keep PR preview subdirectories deployed by the preview workflow.
          clean: true
          clean-exclude: |
            pr-preview/
