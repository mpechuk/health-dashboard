name: Deploy to GitHub Pages

# One-time repo setup required to enable both production + PR previews:
#   Settings → Pages → Source → "Deploy from a branch" → Branch: gh-pages / folder: / (root)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        # No build step — assemble the publishable files (keep .github/README out
        # of the deployed branch).
        run: |
          mkdir -p dist
          cp -r index.html css js .nojekyll dist/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          # Preserve open PR previews when redeploying production.
          clean-exclude: |
            pr-*/
